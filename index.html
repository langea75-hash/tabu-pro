<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tabu Online 2.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>🎲 Tabu Online 💬💬</h1>
      <p>Für 2 bis 4 Spieler</p>
    </header>

    <section id="startScreen" class="panel">
      <h2>Spiel starten</h2>

      <label for="playerName">Dein Name</label>
      <input id="playerName" type="text" maxlength="24" placeholder="Name eingeben" autocomplete="name">

      <label for="teamSelect">Dein Team</label>
      <select id="teamSelect">
        <option value="red">🔴 Team Rot</option>
        <option value="blue">🔵 Team Blau</option>
      </select>

      <button id="createGame" class="primary">🎮 Spiel erstellen</button>

      <div class="divider"><span>oder</span></div>

      <label for="joinCode">Spielcode</label>
      <input id="joinCode" type="text" inputmode="numeric" maxlength="6" placeholder="6-stelligen Code eingeben">

      <button id="joinGame">🤝 Spiel beitreten</button>
      <p id="startMessage" class="message" aria-live="polite"></p>
    </section>

    <section id="gameScreen" class="hidden">
      <section class="panel gameHeader">
        <div>
          <span class="label">Spielcode</span>
          <strong id="gameCode">------</strong>
        </div>
        <div>
          <span class="label">Runde</span>
          <strong id="roundNumber">1</strong>
        </div>
      </section>

      <section class="scoreboard">
        <article class="teamCard redTeam">
          <h2>🔴 Team Rot</h2>
          <div id="redScore" class="score">0</div>
        </article>
        <article class="teamCard blueTeam">
          <h2>🔵 Team Blau</h2>
          <div id="blueScore" class="score">0</div>
        </article>
      </section>

      <section class="panel">
        <h2>👥 Spieler</h2>
        <div id="playersList" class="playersList"></div>
      </section>

      <section class="panel statusPanel">
        <p class="label">Aktueller Erklärer</p>
        <h2 id="explainerName">Warte auf Spieler …</h2>

        <p class="label">Kategorie</p>
        <h2 id="categoryName">–</h2>

        <p id="statusText" class="statusText">Mindestens zwei Spieler müssen beitreten.</p>
      </section>

      <section id="cardArea" class="panel card hidden" aria-live="polite">
        <p id="cardCategory" class="cardCategory">Kategorie</p>
        <h2 id="wordText" class="word">Begriff</h2>

        <h3>🚫 Nicht sagen</h3>
        <div class="tabooWords">
          <p id="taboo1">–</p>
          <p id="taboo2">–</p>
          <p id="taboo3">–</p>
        </div>

        <div class="actions">
          <button id="correct" class="correct">✅ Richtig</button>
          <button id="skip" class="skip">⏭ Weiter</button>
          <button id="endRound" class="danger">🏁 Runde beenden</button>
        </div>
      </section>

      <p id="gameMessage" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="game.js"></script>
</body>
</html>
