function init(){countInfo.textContent=CARDS.length+" Karten geladen";const cats=[...new Set(CARDS.map(c=>c.category))].sort();cats.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;category.appendChild(o)});if(cats.includes("Essen"))category.value="Essen";newCard()}function filtered(){return CARDS.filter(c=>c.category===category.value)}function cardId(c){return c.category+"|"+c.term}function resetDeck(){used[category.value]=[];localStorage.setItem("tabu_used_v2",JSON.stringify(used))}function newCard(){const cat=category.value;const list=filtered();if(!used[cat])used[cat]=[];let available=list.filter(c=>!used[cat].includes(cardId(c)));if(available.length===0){used[cat]=[];available=list}current=available[Math.floor(Math.random()*available.length)];used[cat].push(cardId(current));localStorage.setItem("tabu_used_v2",JSON.stringify(used));renderCard()}function renderCard(){if(!current)return;cardCategory.textContent=current.category;term.textContent=current.term;t1.textContent=current.taboo[0]||"–";t2.textContent=current.taboo[1]||"–";t3.textContent=current.taboo[2]||"–";solution.textContent=current.term;solution.classList.add("hidden");imageBox.textContent=current.image||emojiMap[current.term]||emojiMap[current.term.split(" ")[0]]||"🖼️"}function setMode(){tabuView.classList.toggle("hidden",mode.value!=="tabu");imageView.classList.toggle("hidden",mode.value!=="image")}function showSolution(){solution.classList.remove("hidden")}function addPoint(team){if(team==="red"){red++;redPts.textContent=red}else{blue++;bluePts.textContent=blue}}function correct(){addPoint(activeTeam);stats.played++;stats.right++;saveStats();confetti();newCard()}function wrong(){stats.played++;stats.wrong++;saveStats();newCard()}function saveStats(){localStorage.setItem("tabu_stats_v2",JSON.stringify(stats))}function switchTeam(){activeTeam=activeTeam==="red"?"blue":"red";teamRed.classList.toggle("active",activeTeam==="red");teamBlue.classList.toggle("active",activeTeam
