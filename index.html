<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tabu Pro Online</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">

    <header class="header">
      <h1>🎲 Tabu Pro Online</h1>
      <p>Online-Tabu mit Teams</p>
    </header>

    <section id="start" class="box">
      <h2>Spiel starten</h2>

      <input id="playerName" type="text" placeholder="Dein Name">

      <select id="team">
        <option value="red">🔴 Team Rot</option>
        <option value="blue">🔵 Team Blau</option>
      </select>

      <button id="createGame">🎮 Spiel erstellen</button>

      <hr>

      <input id="joinCode" type="text" placeholder="Spielcode eingeben">

      <button id="joinGame">🤝 Spiel beitreten</button>
    </section>

    <section id="game" class="box hidden">
      <h2>Spielcode: <span id="gameCode">------</span></h2>

      <section class="teams">
        <div class="team red">
          <h3>🔴 Team Rot</h3>
          <div id="redScore" class="score">0</div>
        </div>

        <div class="team blue">
          <h3>🔵 Team Blau</h3>
          <div id="blueScore" class="score">0</div>
        </div>
      </section>

      <section id="waitingArea" class="card">
        <h2 id="statusText">Niemand erklärt gerade.</h2>
        <button id="beExplainer">🎤 Ich bin Erklärer</button>
      </section>

      <section id="cardArea" class="card hidden">
        <div id="category" class="category">Kategorie</div>

        <h1 id="word">Begriff</h1>

        <h3>🚫 Nicht sagen</h3>

        <div id="taboo1" class="taboo">–</div>
        <div id="taboo2" class="taboo">–</div>
        <div id="taboo3" class="taboo">–</div>

        <button id="correct">✅ Richtig</button>
        <button id="skip">⏭️ Weiter</button>
        <button id="endExplain">🏁 Erklärung beenden</button>
      </section>
    </section>

  </main>

  <script type="module" src="game.js"></script>
</body>
</html>
